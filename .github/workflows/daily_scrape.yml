name: Daily Job Scraper

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas python-dotenv python-jobspy openpyxl

      - name: Run scraper
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
        run: python scrapers/jobspy_scraper.py

      - name: Run database save
        run: python analysis/save_to_db.py

      - name: Run processing
        run: python analysis/process_jobs.py

      - name: Commit updated data
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data/jobs_export.csv data/jobs_processed.csv
          git diff --staged --quiet || git commit -m "Daily scrape $(date '+%Y-%m-%d')"
          git push