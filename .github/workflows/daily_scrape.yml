name: Daily Job Scraper

on:
  schedule:
    - cron: '0 7 * * *'    # runs every day at 7am UTC
  workflow_dispatch:         # lets you trigger it manually too

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
        run: python scrapers/jobspy_scraper.py

      - name: Run database save
        run: python analysis/save_to_db.py

      - name: Run processing
        run: python analysis/process_jobs.py

      - name: Commit updated data
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data/jobs_export.csv data/jobs_processed.csv
          git commit -m "Daily scrape $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push